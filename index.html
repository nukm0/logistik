<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ООО "Дюна" — Логистический калькулятор перевозок</title>
    <!-- Yandex Maps API with Suggest & Geocode (ключ из задания) -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=11bec915-26aa-47af-8ee5-2cf9ff56e3e1&lang=ru_RU"></script>
    <!-- Font Awesome Icons & Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f4f8;
            color: #1a2c3e;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* header */
        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }
        .brand h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0b3b5f, #1b7c6c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .brand p {
            color: #2c5f7a;
            font-weight: 500;
        }

        /* card style */
        .card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            padding: 2rem 1.8rem;
            margin-bottom: 2rem;
            transition: all 0.2s ease;
        }

        .step-title {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.5rem;
            border-left: 5px solid #1b7c6c;
            padding-left: 1rem;
        }
        .step-title i {
            color: #1b7c6c;
            font-size: 1.6rem;
        }

        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .address-group {
            background: #f9fafc;
            border-radius: 24px;
            padding: 1.2rem;
        }
        .address-group h3 {
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .input-field {
            margin-bottom: 1rem;
        }
        .input-field label {
            display: block;
            font-weight: 500;
            font-size: 0.85rem;
            margin-bottom: 6px;
            color: #2c3e4e;
        }
        .input-field input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 20px;
            border: 1px solid #dce4ec;
            background: white;
            font-size: 1rem;
            transition: 0.2s;
            font-family: inherit;
        }
        .input-field input:focus {
            outline: none;
            border-color: #1b7c6c;
            box-shadow: 0 0 0 3px rgba(27,124,108,0.2);
        }

        /* красивые переключатели (toggle) */
        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            user-select: none;
        }
        .toggle-switch input {
            display: none;
        }
        .slider {
            width: 52px;
            height: 28px;
            background: #cbd5e1;
            border-radius: 40px;
            display: inline-block;
            position: relative;
            transition: 0.25s;
        }
        .slider:before {
            content: "";
            position: absolute;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 3px;
            transition: 0.2s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }
        .toggle-switch input:checked + .slider {
            background: #1b7c6c;
        }
        .toggle-switch input:checked + .slider:before {
            transform: translateX(22px);
        }
        .toggle-label {
            font-weight: 500;
        }

        .btn {
            background: #1b7c6c;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-outline {
            background: white;
            border: 1px solid #1b7c6c;
            color: #1b7c6c;
        }
        .btn-outline:hover {
            background: #eef7f4;
        }
        .btn:hover {
            background: #0f5e52;
            transform: translateY(-2px);
        }

        .vehicle-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            margin: 20px 0;
        }
        .vehicle-card {
            flex: 1 1 150px;
            background: #f8fafd;
            border-radius: 24px;
            padding: 16px 8px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .vehicle-card.selected {
            border-color: #1b7c6c;
            background: #e2f0ed;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
        }
        .vehicle-icon {
            font-size: 2.8rem;
            color: #2c5f7a;
        }
        .option-group {
            margin: 20px 0;
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 12px;
        }
        .cargo-item {
            background: #f8fafc;
            border-radius: 28px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .flex-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }
        hr {
            margin: 1rem 0;
            border-color: #e2e8f0;
        }
        .price-badge {
            background: #0f2e3a;
            color: white;
            border-radius: 60px;
            padding: 8px 20px;
            font-weight: 700;
            font-size: 1.5rem;
            display: inline-block;
        }
        @media (max-width: 780px) {
            .grid-2col { grid-template-columns: 1fr; }
            body { padding: 1rem; }
        }
        .info-note {
            font-size: 0.75rem;
            color: #5f7f8e;
            margin-top: 8px;
        }
        .distance-box {
            background: #eef2f6;
            border-radius: 28px;
            padding: 12px 18px;
            margin-top: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="brand">
        <h1><i class="fas fa-truck-moving"></i> ООО "Дюна"</h1>
        <p>Профессиональная логистика — быстрый расчёт стоимости перевозки</p>
    </div>

    <!-- ШАГ 1: Маршрут и расстояние -->
    <div class="card" id="stepRouteCard">
        <div class="step-title"><i class="fas fa-map-marked-alt"></i> <span>1. Маршрут перевозки</span></div>
        <div class="grid-2col">
            <div class="address-group">
                <h3><i class="fas fa-circle-dot"></i> Откуда</h3>
                <div class="input-field"><label>Город</label><input type="text" id="fromCity" placeholder="Начните вводить город..."></div>
                <div class="input-field"><label>Улица</label><input type="text" id="fromStreet" placeholder="Улица"></div>
                <div class="input-field"><label>Дом</label><input type="text" id="fromHouse" placeholder="дом"></div>
            </div>
            <div class="address-group">
                <h3><i class="fas fa-flag-checkered"></i> Куда</h3>
                <div class="input-field"><label>Город</label><input type="text" id="toCity" placeholder="Начните вводить город..."></div>
                <div class="input-field"><label>Улица</label><input type="text" id="toStreet" placeholder="Улица"></div>
                <div class="input-field"><label>Дом</label><input type="text" id="toHouse" placeholder="дом"></div>
            </div>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-top: 10px;">
            <div class="toggle-switch">
                <input type="checkbox" id="roundTripToggle">
                <span class="slider"></span>
                <span class="toggle-label"><i class="fas fa-redo-alt"></i> Кругорейс (туда-обратно)</span>
            </div>
            <button class="btn" id="calcDistanceBtn"><i class="fas fa-route"></i> Рассчитать расстояние</button>
        </div>
        <div class="distance-box" id="distanceDisplay">
            <span><i class="fas fa-road"></i> Расстояние: </span>
            <strong id="distanceKmValue">— км</strong>
            <span id="distanceHint" style="font-size: 0.8rem;"></span>
        </div>
        <div class="info-note"><i class="fas fa-lightbulb"></i> Умный поиск: вводите город, система подскажет.</div>
    </div>

    <!-- ШАГ 2: Тип отправки (появляется после расстояния) -->
    <div class="card" id="stepTypeCard" style="display: none;">
        <div class="step-title"><i class="fas fa-boxes"></i> <span>2. Тип отправки</span></div>
        <div class="checkbox-group" style="justify-content: center; gap: 30px;">
            <div class="toggle-switch" style="flex-direction: row-reverse;">
                <input type="radio" name="shipType" value="ltl" id="typeLTL">
                <span class="slider"></span>
                <span class="toggle-label"><i class="fas fa-cubes"></i> Сборный груз (LTL)</span>
            </div>
            <div class="toggle-switch" style="flex-direction: row-reverse;">
                <input type="radio" name="shipType" value="dedicated" id="typeDedicated">
                <span class="slider"></span>
                <span class="toggle-label"><i class="fas fa-truck"></i> Выделенный транспорт</span>
            </div>
        </div>
        <button class="btn" id="confirmTypeBtn" style="margin-top: 20px; width: 100%;">Продолжить оформление →</button>
    </div>

    <!-- ШАГ 3: Динамические формы (сборный / выделенный) -->
    <div id="dynamicFormContainer"></div>

    <!-- ШАГ 4: Итоговая форма с данными и отправкой -->
    <div id="summaryContainer" style="display: none;"></div>
</div>

<script>
    // ------------------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ --------------------
    let currentDistanceKm = 0;
    let selectedShipType = null;      // 'ltl' or 'dedicated'
    let dedicatedData = {
        vehicle: null,
        bodyType: null,
        loadingOptions: [],    // зад, бок, верх
        extraOptions: []       // ремни, гидроборт
    };
    let ltlCargoList = [];     // массив грузов
    let currentStep = 1;       // для управления
    let routeSelected = false;
    let ymapsReady = false;
    let suggestFromCity, suggestToCity;
    
    // Цены и коэфф. транспорта (выделенный)
    const vehicleRates = [
        { name: "1,5 тонн / 10 кубов", tons: 1.5, cub:10, multiplier: 1.0, icon: "fa-truck-fast" },
        { name: "3 тонн / 25 кубов", tons: 3, cub:25, multiplier: 1.2, icon: "fa-truck" },
        { name: "5 тонн / 36 кубов", tons: 5, cub:36, multiplier: 1.5, icon: "fa-truck-moving" },
        { name: "10 тонн / 45 кубов", tons: 10, cub:45, multiplier: 2.0, icon: "fa-truck-ramp-box" },
        { name: "20 тонн / 92 кубов", tons: 20, cub:92, multiplier: 2.2, icon: "fa-trailer" },
        { name: "20 тонн / 115 кубов", tons: 20, cub:115, multiplier: 2.5, icon: "fa-truck-container" }
    ];

    // Базовая ставка за км по дистанции (из скриншота)
    function getRatePerKm(distanceKm) {
        if (distanceKm <= 10) return 150;
        if (distanceKm <= 40) return 108;
        if (distanceKm <= 100) return 72;
        if (distanceKm <= 150) return 66;
        if (distanceKm <= 300) return 54;
        return 54;  // свыше 301
    }

    // Минимальный заказ 3000р
    function calculateBaseDistanceCost(distance, roundTrip) {
        let effectiveDist = distance;
        if (roundTrip) effectiveDist = distance * 2;
        let perKm = getRatePerKm(effectiveDist);
        let cost = effectiveDist * perKm;
        return Math.max(cost, 3000);
    }

    // Расчет для выделенного транспорта
    function calculateDedicatedPrice(distance, roundTrip, vehicleMultiplier, extraOptions) {
        let base = calculateBaseDistanceCost(distance, roundTrip);
        let vehicleCost = base * vehicleMultiplier;
        let extrasSum = 0;
        if (extraOptions.includes('remni')) extrasSum += 500;
        if (extraOptions.includes('gidrobort')) extrasSum += 1000;
        return Math.round(vehicleCost + extrasSum);
    }

    // Расчет для сборного груза (объемно-весовой)
    function calculateLTLPrice(distance, roundTrip, cargoArray) {
        if (!cargoArray.length) return 3000;
        let totalWeightKg = 0;
        let totalVolWeight = 0; // объемный вес (кг) по формуле (см³/5000)
        cargoArray.forEach(cargo => {
            let w = cargo.weightVal * (cargo.weightUnit === 'т' ? 1000 : 1);
            let volCm = cargo.length * cargo.width * cargo.height;
            let dimWeight = volCm / 5000;  // кг
            totalWeightKg += w * cargo.qty;
            totalVolWeight += dimWeight * cargo.qty;
        });
        let chargeableWeight = Math.max(totalWeightKg, totalVolWeight);
        let baseDistanceCost = calculateBaseDistanceCost(distance, roundTrip);
        // коэффициент загрузки: от веса/объема, база: 100 кг -> коэф 0.7, 1000 кг -> 1.5 и т.д
        let weightFactor = Math.max(0.6, Math.min(4.5, chargeableWeight / 500));
        let finalPrice = baseDistanceCost * weightFactor;
        return Math.max(Math.round(finalPrice), 3000);
    }

    // Инициализация яндекс саджестов
    function initYandexSuggest() {
        if (!ymapsReady) return;
        suggestFromCity = new ymaps.SuggestView('fromCity', { provider: 'yandex#map', results: 5 });
        suggestToCity = new ymaps.SuggestView('toCity', { provider: 'yandex#map', results: 5 });
    }

    // Получение координат через геокодер
    async function getCoordsFromAddress(city, street, house) {
        if (!city) return null;
        let query = `${city} ${street} ${house}`.trim();
        if (!query) query = city;
        try {
            let response = await fetch(`https://geocode-maps.yandex.ru/1.x/?apikey=11bec915-26aa-47af-8ee5-2cf9ff56e3e1&geocode=${encodeURIComponent(query)}&format=json&results=1`);
            let data = await response.json();
            let members = data.response.GeoObjectCollection.featureMember;
            if (members.length) {
                let pos = members[0].GeoObject.Point.pos.split(' ');
                return { lon: parseFloat(pos[0]), lat: parseFloat(pos[1]) };
            }
        } catch(e) { console.warn(e); }
        return null;
    }

    async function calculateDistance() {
        let fromCity = document.getElementById('fromCity').value.trim();
        let fromStreet = document.getElementById('fromStreet').value.trim();
        let fromHouse = document.getElementById('fromHouse').value.trim();
        let toCity = document.getElementById('toCity').value.trim();
        let toStreet = document.getElementById('toStreet').value.trim();
        let toHouse = document.getElementById('toHouse').value.trim();
        if (!fromCity || !toCity) {
            alert("Укажите город отправления и город назначения");
            return;
        }
        const fromCoord = await getCoordsFromAddress(fromCity, fromStreet, fromHouse);
        const toCoord = await getCoordsFromAddress(toCity, toStreet, toHouse);
        if (!fromCoord || !toCoord) {
            alert("Не удалось определить координаты. Уточните адрес.");
            return;
        }
        // Маршрут через Яндекс.Маршрутизатор
        if (!ymapsReady) {
            alert("Карты ещё не загружены, попробуйте через секунду");
            return;
        }
        const multiRoute = new ymaps.multiRouter.MultiRoute({
            referencePoints: [
                [fromCoord.lat, fromCoord.lon],
                [toCoord.lat, toCoord.lon]
            ],
            params: { routingMode: 'auto' }
        });
        multiRoute.model.events.add('requestsuccess', function() {
            let length = multiRoute.getLength();
            if (length) {
                currentDistanceKm = Math.round(length / 1000);
                document.getElementById('distanceKmValue').innerText = currentDistanceKm + " км";
                let roundTripChecked = document.getElementById('roundTripToggle').checked;
                let displayDist = roundTripChecked ? (currentDistanceKm * 2) : currentDistanceKm;
                document.getElementById('distanceHint').innerHTML = roundTripChecked ? `(кругорейс: ${displayDist} км)` : "";
                routeSelected = true;
                document.getElementById('stepTypeCard').style.display = 'block';
            } else {
                alert("Не удалось проложить маршрут");
            }
        });
        multiRoute.model.events.add('requesterror', function() { alert("Ошибка расчёта дистанции"); });
    }

    // Рендер динамики: выбор типа транспорта
    function renderDynamicByType() {
        const container = document.getElementById('dynamicFormContainer');
        if (selectedShipType === 'ltl') {
            renderLTLForm(container);
        } else if (selectedShipType === 'dedicated') {
            renderDedicatedForm(container);
        }
    }

    function renderLTLForm(container) {
        container.innerHTML = `
            <div class="card">
                <div class="step-title"><i class="fas fa-pallet"></i> Параметры грузов (сборный)</div>
                <div id="ltlCargoItems"></div>
                <button class="btn btn-outline" id="addCargoBtn" style="margin: 10px 0;"><i class="fas fa-plus-circle"></i> Добавить груз</button>
                <button class="btn" id="finishLTLBtn">Рассчитать и перейти к оформлению →</button>
            </div>
        `;
        function renderCargoList() {
            const cargoDiv = document.getElementById('ltlCargoItems');
            if (!cargoDiv) return;
            cargoDiv.innerHTML = '';
            ltlCargoList.forEach((cargo, idx) => {
                let cargoHtml = `
                    <div class="cargo-item" data-idx="${idx}">
                        <div class="flex-row">
                            <div><label>Длина(см)</label><input type="number" class="cargo-length" value="${cargo.length}" style="width:100px"></div>
                            <div><label>Ширина(см)</label><input type="number" class="cargo-width" value="${cargo.width}" style="width:100px"></div>
                            <div><label>Высота(см)</label><input type="number" class="cargo-height" value="${cargo.height}" style="width:100px"></div>
                            <div><label>Вес</label><input type="number" class="cargo-weight" value="${cargo.weightVal}" style="width:90px"></div>
                            <div><label>Ед.веса</label><select class="cargo-weightunit"><option ${cargo.weightUnit==='кг'?'selected':''}>кг</option><option ${cargo.weightUnit==='т'?'selected':''}>т</option></select></div>
                            <div><label>Кол-во(шт)</label><input type="number" class="cargo-qty" value="${cargo.qty}" style="width:80px"></div>
                            <div><label class="toggle-switch" style="gap:5px">Вращать<input type="checkbox" class="cargo-rotate" ${cargo.rotate?'checked':''}><span class="slider" style="width:40px;height:20px;"></span></label></div>
                            <div><label class="toggle-switch" style="gap:5px">Ставить друг на друга<input type="checkbox" class="cargo-stack" ${cargo.stack?'checked':''}><span class="slider" style="width:40px;height:20px;"></span></label></div>
                            <button class="btn-outline removeCargoBtn" style="padding:6px 12px">Удалить</button>
                        </div>
                    </div>
                `;
                cargoDiv.insertAdjacentHTML('beforeend', cargoHtml);
                const block = cargoDiv.lastElementChild;
                block.querySelector('.cargo-length').addEventListener('change', (e) => ltlCargoList[idx].length = parseInt(e.target.value)||0);
                block.querySelector('.cargo-width').addEventListener('change', (e) => ltlCargoList[idx].width = parseInt(e.target.value)||0);
                block.querySelector('.cargo-height').addEventListener('change', (e) => ltlCargoList[idx].height = parseInt(e.target.value)||0);
                block.querySelector('.cargo-weight').addEventListener('change', (e) => ltlCargoList[idx].weightVal = parseFloat(e.target.value)||0);
                block.querySelector('.cargo-weightunit').addEventListener('change', (e) => ltlCargoList[idx].weightUnit = e.target.value);
                block.querySelector('.cargo-qty').addEventListener('change', (e) => ltlCargoList[idx].qty = parseInt(e.target.value)||1);
                block.querySelector('.cargo-rotate').addEventListener('change', (e) => ltlCargoList[idx].rotate = e.target.checked);
                block.querySelector('.cargo-stack').addEventListener('change', (e) => ltlCargoList[idx].stack = e.target.checked);
                block.querySelector('.removeCargoBtn').addEventListener('click', () => { ltlCargoList.splice(idx,1); renderCargoList(); });
            });
        }
        if (ltlCargoList.length === 0) {
            ltlCargoList.push({ length:50, width:40, height:30, weightVal:10, weightUnit:'кг', qty:1, rotate:false, stack:false });
        }
        renderCargoList();
        document.getElementById('addCargoBtn').addEventListener('click', () => {
            ltlCargoList.push({ length:50, width:40, height:30, weightVal:5, weightUnit:'кг', qty:1, rotate:false, stack:false });
            renderCargoList();
        });
        document.getElementById('finishLTLBtn').addEventListener('click', () => showSummaryLTL());
    }

    function renderDedicatedForm(container) {
        container.innerHTML = `
            <div class="card">
                <div class="step-title"><i class="fas fa-truck"></i> Выберите автомобиль</div>
                <div class="vehicle-grid" id="vehicleGrid"></div>
                <div id="bodyTypeContainer" style="display: none;">
                    <div class="option-group"><strong>Тип кузова</strong><div class="checkbox-group" id="bodyTypeGroup"></div></div>
                </div>
                <div id="extraOptionsContainer" style="display: none;">
                    <div class="option-group"><strong>Способы погрузки (можно несколько)</strong><div class="checkbox-group" id="loadingGroup"></div></div>
                    <div class="option-group"><strong>Дополнительное оборудование</strong><div class="checkbox-group" id="extraGroup"></div></div>
                    <button class="btn" id="finishDedicatedBtn">Далее к оформлению</button>
                </div>
            </div>
        `;
        const vehicleGrid = document.getElementById('vehicleGrid');
        vehicleRates.forEach((v, idx) => {
            const cardDiv = document.createElement('div');
            cardDiv.className = 'vehicle-card';
            cardDiv.innerHTML = `<i class="fas ${v.icon} vehicle-icon"></i><div><strong>${v.name}</strong></div><div style="font-size:12px">${v.multiplier}x базовая ставка</div>`;
            cardDiv.addEventListener('click', () => {
                document.querySelectorAll('.vehicle-card').forEach(c => c.classList.remove('selected'));
                cardDiv.classList.add('selected');
                dedicatedData.vehicle = v;
                showBodyTypeOptions();
            });
            vehicleGrid.appendChild(cardDiv);
        });
        function showBodyTypeOptions() {
            const bodyContainer = document.getElementById('bodyTypeContainer');
            bodyContainer.style.display = 'block';
            const bodyGroup = document.getElementById('bodyTypeGroup');
            bodyGroup.innerHTML = '';
            const bodyTypes = ['Тентовый', 'Изотермо', 'Бортовая'];
            bodyTypes.forEach(bt => {
                const toggle = document.createElement('div'); toggle.className = 'toggle-switch';
                const radio = document.createElement('input'); radio.type = 'radio'; radio.name = 'bodyType'; radio.value = bt;
                const slider = document.createElement('span'); slider.className = 'slider';
                const labelSpan = document.createElement('span'); labelSpan.className = 'toggle-label'; labelSpan.innerText = bt;
                toggle.appendChild(radio); toggle.appendChild(slider); toggle.appendChild(labelSpan);
                radio.addEventListener('change', () => { if(radio.checked) dedicatedData.bodyType = bt; showExtras(); });
                bodyGroup.appendChild(toggle);
            });
        }
        function showExtras() {
            document.getElementById('extraOptionsContainer').style.display = 'block';
            const loadingGroup = document.getElementById('loadingGroup');
            const extraGroup = document.getElementById('extraGroup');
            loadingGroup.innerHTML = ''; extraGroup.innerHTML = '';
            const loadOpts = ['Зад', 'Бок', 'Верх'];
            loadOpts.forEach(opt => {
                const toggle = createCheckboxToggle(opt, 'loading', (checked) => {
                    if(checked) dedicatedData.loadingOptions.push(opt);
                    else dedicatedData.loadingOptions = dedicatedData.loadingOptions.filter(o => o !== opt);
                });
                loadingGroup.appendChild(toggle);
            });
            const extraOpts = ['Ремни', 'Гидроборт'];
            extraOpts.forEach(opt => {
                const eng = opt === 'Ремни' ? 'remni' : 'gidrobort';
                const toggle = createCheckboxToggle(opt, 'extra', (checked) => {
                    if(checked) dedicatedData.extraOptions.push(eng);
                    else dedicatedData.extraOptions = dedicatedData.extraOptions.filter(o => o !== eng);
                });
                extraGroup.appendChild(toggle);
            });
            document.getElementById('finishDedicatedBtn').onclick = () => showSummaryDedicated();
        }
        function createCheckboxToggle(labelText, group, onChange) {
            const div = document.createElement('div'); div.className = 'toggle-switch';
            const cb = document.createElement('input'); cb.type = 'checkbox';
            const slider = document.createElement('span'); slider.className = 'slider';
            const spanLabel = document.createElement('span'); spanLabel.className = 'toggle-label'; spanLabel.innerText = labelText;
            div.appendChild(cb); div.appendChild(slider); div.appendChild(spanLabel);
            cb.addEventListener('change', (e) => onChange(e.target.checked));
            return div;
        }
    }

    async function showSummaryLTL() {
        if(!ltlCargoList.length) { alert("Добавьте хотя бы один груз"); return; }
        const roundTrip = document.getElementById('roundTripToggle').checked;
        const price = calculateLTLPrice(currentDistanceKm, roundTrip, ltlCargoList);
        displaySummaryCard({type:'ltl', price, cargoList: ltlCargoList, distance: currentDistanceKm, roundTrip});
    }
    async function showSummaryDedicated() {
        if(!dedicatedData.vehicle) { alert("Выберите автомобиль"); return; }
        if(!dedicatedData.bodyType) { alert("Выберите тип кузова"); return; }
        const roundTrip = document.getElementById('roundTripToggle').checked;
        const price = calculateDedicatedPrice(currentDistanceKm, roundTrip, dedicatedData.vehicle.multiplier, dedicatedData.extraOptions);
        displaySummaryCard({type:'dedicated', price, vehicle: dedicatedData.vehicle, bodyType: dedicatedData.bodyType, loadingOpts: dedicatedData.loadingOptions, extraOpts: dedicatedData.extraOptions, distance: currentDistanceKm, roundTrip});
    }

    function displaySummaryCard(data) {
        const summaryDiv = document.getElementById('summaryContainer');
        summaryDiv.style.display = 'block';
        let detailsHtml = `<div class="card"><div class="step-title"><i class="fas fa-file-invoice"></i> Детали заказа</div>`;
        detailsHtml += `<p><strong>Маршрут:</strong> ${document.getElementById('fromCity').value} → ${document.getElementById('toCity').value} ${data.roundTrip ? '(кругорейс)' : ''}</p>`;
        detailsHtml += `<p><strong>Расстояние:</strong> ${data.distance} км (${data.roundTrip ? `общий путь ${data.distance*2} км` : 'в одну сторону'})</p>`;
        detailsHtml += `<p><strong>Итоговая стоимость:</strong> <span class="price-badge">${data.price} ₽</span></p>`;
        if(data.type === 'ltl') {
            detailsHtml += `<p><strong>Тип перевозки:</strong> Сборный груз (${data.cargoList.length} позиций)</p>`;
        } else {
            detailsHtml += `<p><strong>Транспорт:</strong> ${data.vehicle.name}, кузов: ${data.bodyType}, доп.опции: ${data.extraOpts.length ? data.extraOpts.join(',') : 'нет'}</p>`;
        }
        detailsHtml += `<hr><form id="contactForm"><div class="input-field"><label>Имя</label><input id="clientName" required></div>
        <div class="input-field"><label>Номер телефона</label><input id="clientPhone" required></div>
        <div class="input-field"><label>Email</label><input id="clientEmail" type="email" required></div>
        <div class="input-field"><label>Комментарий к заказу</label><textarea id="clientComment" rows="2"></textarea></div>
        <button type="submit" class="btn" style="width:100%"><i class="fas fa-envelope"></i> Отправить заявку на почту</button></form></div>`;
        summaryDiv.innerHTML = detailsHtml;
        const form = document.getElementById('contactForm');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('clientName').value;
            const phone = document.getElementById('clientPhone').value;
            const email = document.getElementById('clientEmail').value;
            const comment = document.getElementById('clientComment').value;
            let bodyMail = `ЗАКАЗ ООО "ДЮНА"\nИмя: ${name}\nТел: ${phone}\nEmail: ${email}\nКомментарий: ${comment}\n\nДетали маршрута:\nОткуда: ${document.getElementById('fromCity').value}, ${document.getElementById('fromStreet').value}, ${document.getElementById('fromHouse').value}\nКуда: ${document.getElementById('toCity').value}, ${document.getElementById('toStreet').value}, ${document.getElementById('toHouse').value}\n`;
            bodyMail += `Расстояние: ${data.distance} км, Кругорейс: ${data.roundTrip ? 'Да' : 'Нет'}\nСтоимость: ${data.price} руб.\n`;
            if(data.type === 'ltl') bodyMail += `Тип: Сборный груз. Грузы: ${JSON.stringify(data.cargoList)}\n`; else bodyMail += `Тип: Выделенный транспорт. Авто: ${data.vehicle.name}, кузов:${data.bodyType}, погрузка:${data.loadingOpts?.join(',')}, опции:${data.extraOpts?.join(',')}\n`;
            window.location.href = `mailto:dune@logistic.ru?subject=Заявка на перевозку от ${name}&body=${encodeURIComponent(bodyMail)}`;
            alert("Заявка перенаправлена в почтовый клиент. Отправьте письмо владельцу: dune@logistic.ru");
        });
    }

    // Инициализация событий
    ymaps.ready(() => {
        ymapsReady = true;
        initYandexSuggest();
    });
    document.getElementById('calcDistanceBtn').addEventListener('click', calculateDistance);
    document.getElementById('confirmTypeBtn').addEventListener('click', () => {
        if (!routeSelected || currentDistanceKm === 0) { alert("Сначала рассчитайте расстояние."); return; }
        const ltlRadio = document.getElementById('typeLTL');
        const dedicatedRadio = document.getElementById('typeDedicated');
        if (!ltlRadio.checked && !dedicatedRadio.checked) { alert("Выберите тип отправки"); return; }
        selectedShipType = ltlRadio.checked ? 'ltl' : 'dedicated';
        renderDynamicByType();
        document.getElementById('dynamicFormContainer').scrollIntoView({ behavior: 'smooth' });
    });
</script>
